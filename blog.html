---
layout: default
title: Writing
permalink: /blog/
---

<p class="page-title">Writing</p>

<input type="text" id="search-input" placeholder="search posts..." autocomplete="off" spellcheck="false" />

<ul class="post-list" id="post-list">
  {% for post in site.posts %}
  <li class="post-entry" data-title="{{ post.title | downcase }}" data-tags="{{ post.tags | join: ' ' | downcase }}">
    <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
    <div class="post-meta-line">
      <span>{{ post.date | date: "%B %-d, %Y" }}</span>
      {% for tag in post.tags %}<span class="post-tag">{{ tag }}</span>{% endfor %}
    </div>
    <p class="post-excerpt">{{ post.excerpt | strip_html | truncate: 180 }}</p>
  </li>
  {% endfor %}
</ul>

<script>
  var input = document.getElementById('search-input');
  var entries = document.querySelectorAll('.post-entry');
  input.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    entries.forEach(function(el) {
      var match = !q || el.dataset.title.includes(q) || el.dataset.tags.includes(q);
      el.style.display = match ? '' : 'none';
    });
  });
</script>
